<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>WC 2026 – Live Prediction Game</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #1a6b3a; --green-light: #e8f5ee; --green-dark: #0f4a27;
      --bg: #ffffff; --bg-secondary: #f6f7f8; --bg-tertiary: #eef0f2;
      --text-primary: #111; --text-secondary: #555; --text-tertiary: #999;
      --border: rgba(0,0,0,0.1); --border-md: rgba(0,0,0,0.18);
      --radius-sm: 6px; --radius-md: 10px; --radius-lg: 14px; --radius-pill: 999px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #161616; --bg-secondary: #1f1f1f; --bg-tertiary: #2a2a2a;
        --text-primary: #f0f0f0; --text-secondary: #aaa; --text-tertiary: #666;
        --border: rgba(255,255,255,0.1); --border-md: rgba(255,255,255,0.18);
        --green-light: #0a2a18; --green-dark: #9FE1CB;
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-tertiary); color: var(--text-primary); font-size: 15px; line-height: 1.5; min-height: 100vh; }
    .app-shell { max-width: 520px; margin: 0 auto; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; }
    .app-header { background: var(--green); color: #fff; padding: 16px 16px 0; position: sticky; top: 0; z-index: 100; }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .header-title { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: 500; }
    .header-badge { background: rgba(255,255,255,0.2); font-size: 10px; padding: 3px 10px; border-radius: var(--radius-pill); }
    .header-sub { font-size: 11px; opacity: 0.7; margin-top: 2px; }
    .bottom-nav { display: flex; background: var(--green); }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 0 12px; background: transparent; border: none; color: rgba(255,255,255,0.55); font-size: 10px; font-weight: 500; cursor: pointer; }
    .nav-btn i { font-size: 20px; }
    .nav-btn.active { color: #fff; border-top: 2px solid rgba(255,255,255,0.85); }
    .main-content { flex: 1; padding: 16px; overflow-y: auto; }
    .section { display: none; }
    .section.active { display: block; }
    .sec-label { font-size: 10px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; margin-bottom: 8px; }
    .carousel-container { margin: 0 -16px 16px -16px; padding: 0 16px; overflow-x: auto; scroll-snap-type: x mandatory; }
    .carousel-container::-webkit-scrollbar { display: none; }
    .carousel-track { display: flex; gap: 12px; }
    .carousel-card { flex: 0 0 88%; scroll-snap-align: start; border: 2px solid var(--green); border-radius: var(--radius-lg); background: var(--bg); }
    .cc-head { background: var(--green); color: #fff; padding: 10px 14px; display: flex; justify-content: space-between; }
    .cc-body { padding: 14px; }
    .cc-matchup-title { font-size: 14px; font-weight: 600; text-align: center; margin-bottom: 12px; }
    .cg-head-title { display: flex; gap: 6px; font-size: 13px; font-weight: 500; }
    .cg-time-badge { font-size: 10px; background: rgba(255,255,255,0.2); padding: 3px 9px; border-radius: var(--radius-pill); }
    .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 12px; }
    .player-row { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-bottom: 0.5px solid var(--border); cursor: pointer; transition: background 0.2s; }
    .player-row:hover { background: var(--bg-secondary); }
    .rank-badge { font-size: 12px; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; }
    .avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; }
    .player-info { flex: 1; }

    .bar-track { height: 5px; background: var(--bg-tertiary); border-radius: 3px; margin-top: 5px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
    .pts-col { text-align: right; }
    .pts-big { font-size: 22px; font-weight: 500; line-height: 1; }
    .pts-unit { font-size: 10px; color: var(--text-tertiary); }
    .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 14px; }
    .stat-box { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 12px; text-align: center; }
    .stat-box .sv { font-size: 24px; font-weight: 500; }
    .stat-box .sl { font-size: 11px; color: var(--text-secondary); margin-top: 3px; }
    .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .pill-btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 13px; border-radius: var(--radius-pill); border: 0.5px solid var(--border-md); font-size: 12px; font-weight: 500; cursor: pointer; background: transparent; color: var(--text-secondary); transition: all 0.2s; }
    .pill-btn.active { background: var(--green); color: #fff; border-color: var(--green); }
    .pill-count { font-size: 10px; background: rgba(0,0,0,0.08); padding: 1px 5px; border-radius: 999px; margin-left: 2px; }
    .pill-btn.active .pill-count { background: rgba(255,255,255,0.25); }
    .match-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 10px; overflow: hidden; }
    .match-head { display: flex; justify-content: space-between; padding: 8px 12px; background: var(--bg-secondary); border-bottom: 0.5px solid var(--border); }
    .match-head-left { display: flex; gap: 7px; align-items: center; }
    .grp-pill { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: var(--radius-pill); background: var(--green-light); color: var(--green-dark); }
    .match-time { font-size: 10px; color: var(--text-tertiary); }
    .score-badge { font-size: 12px; font-weight: 500; padding: 3px 10px; border-radius: var(--radius-sm); background: var(--bg); border: 0.5px solid var(--border-md); }
    .pending-tag { font-size: 10px; color: #b8860b; display: flex; gap: 3px; align-items: center; }
    .match-body { padding: 10px 12px; }
    .matchup-name { font-size: 13px; font-weight: 500; margin-bottom: 9px; }
    .preds-list { display: flex; flex-direction: column; gap: 5px; }
    .pred-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; border-radius: 7px; background: var(--bg-secondary); }
    .pred-row.correct { background: #e8f5ee; }
    .pred-row.partial { background: #fef9e7; }
    .pred-row.wrong { background: #fef2f2; opacity: 0.8; }
    @media (prefers-color-scheme: dark) {
      .pred-row.correct { background: #0a2a18; }
      .pred-row.partial { background: #2a1f00; }
      .pred-row.wrong { background: #2a0a0a; }
    }
    .pred-left { display: flex; gap: 7px; align-items: center; }
    .pred-dot { width: 8px; height: 8px; border-radius: 50%; }
    .pred-pname { font-size: 12px; color: var(--text-secondary); }
    .pred-score { font-size: 12px; font-weight: 500; }
    .pts-badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: var(--radius-pill); }
    .pts-badge.p3 { background: #1a6b3a; color: #fff; }
    .pts-badge.p1 { background: #b8860b; color: #fff; }
    .pts-badge.p0 { background: var(--bg-tertiary); color: var(--text-tertiary); }
    .no-pred { font-size: 11px; color: var(--text-tertiary); }
    .player-profile-card { display: flex; align-items: center; gap: 12px; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px; margin-bottom: 12px; }
    .player-profile-pts-num { font-size: 30px; font-weight: 500; line-height: 1; }
    .match-pred-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 8px; border-radius: 7px; background: var(--bg-secondary); margin-bottom: 5px; }
    .match-pred-row.correct { background: #e8f5ee; }
    .match-pred-row.partial { background: #fef9e7; }
    .match-pred-row.wrong { background: #fef2f2; opacity: 0.82; }
    .match-pred-name { font-size: 11px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
    .match-pred-score { font-size: 13px; font-weight: 500; margin-top: 1px; }
    .match-pred-right { text-align: right; flex-shrink: 0; }
    .actual-result { font-size: 10px; color: var(--text-tertiary); margin-top: 2px; }
    .upcoming-inline { display: inline-flex; gap: 2px; font-size: 10px; color: #b8860b; margin-left: 4px; }
    .loading, .error { text-align: center; padding: 40px; color: var(--text-tertiary); }
    .error { color: #e05252; }
    .player-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .player-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: var(--radius-pill); border: 0.5px solid var(--border-md); font-size: 12px; font-weight: 500; cursor: pointer; background: transparent; color: var(--text-secondary); transition: all 0.2s; }
    .player-btn.active { color: #fff; }
    .accuracy-bar-wrap { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 10px 14px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
    .refresh-btn { background: var(--green); color: white; border: none; padding: 8px 16px; border-radius: var(--radius-pill); font-size: 12px; cursor: pointer; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  </style>
</head>
<body>
<div class="app-shell">
  <header class="app-header">
    <div class="header-top">
      <div>
        <div class="header-title"><i class="ti ti-trophy"></i> WC 2026 Live</div>
        <div class="header-sub" id="headerSub">Loading from Google Sheets...</div>
      </div>
      <span class="header-badge">Group stage</span>
    </div>
    <nav class="bottom-nav">
      <button class="nav-btn active" onclick="showSection('standings', this)"><i class="ti ti-chart-bar"></i> Standings</button>

      <div>Loading data from Google Sheets...</div>
    </div>
    <div id="appContent" style="display:none;">
      <button class="refresh-btn" onclick="loadData()"><i class="ti ti-refresh"></i> Refresh Data</button>
      <section id="standings" class="section active">
        
        <div class="sec-label">Today's Games</div>
        <div id="todaysGamesContainer" style="margin-bottom: 20px;"></div>

        <div class="sec-label">Leaderboard</div>
        <div class="card" id="leaderboard"></div>

        <div class="stat-grid" id="overviewStats"></div>
      </section>
      <section id="matches" class="section">
        <div id="statusTabs" class="filter-bar"></div>
        <div id="groupTabs" class="filter-bar"></div>
        <div id="matchList"></div>
      </section>

        <div class="sec-label">Select player</div>
        <div id="playerBtns" class="player-btns"></div>

          <div class="avatar" id="playerAvatar" style="width:50px;height:50px;"></div>
          <div><div id="playerName" class="player-profile-name"></div><div id="playerRank" class="player-profile-rank"></div></div>
          <div class="player-profile-pts"><div id="playerPtsNum" class="player-profile-pts-num"></div><div class="player-profile-pts-label">pts total</div></div>
        </div>
        <div class="stat-grid" id="playerStats"></div>
        <div id="playerAccuracyBar" class="accuracy-bar-wrap" style="display:none"><span>Accuracy on scored matches</span><span id="playerAccuracyVal"></span></div>
        <div class="sec-label">All predictions</div>
        <div id="playerMatchPreds"></div>
      </section>
    </div>
  </main>
</div>

<script>
// ============================================================
// YOUR APPS SCRIPT URL
// ============================================================
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzkXF9xUu6wq-xy1w23u5VwoZoFnLU-oKUM4MNNC7q1AKBl3Lr5oGDJ3vyUV73_C2kj8g/exec';

// Player colors mapping
const PLAYER_COLORS = {
  'Amit': { color: '#5b6cf6', bg: '#eeedfe', textc: '#3C3489', initials: 'AM' },
  'Barun': { color: '#1a6b3a', bg: '#e8f5ee', textc: '#0f4a27', initials: 'BA' },
  'Prashanna': { color: '#d97706', bg: '#faeeda', textc: '#633806', initials: 'PR' },
  'Rishav': { color: '#e05252', bg: '#fcebeb', textc: '#791f1f', initials: 'RI' },
  'Sweastik': { color: '#7c3aed', bg: '#eeedfe', textc: '#26215C', initials: 'SW' }
};

let PLAYERS = [];
let MATCHES = [];
let activeGroup = 'All';
let activeStatus = 'upcoming';
let activePlayer = '';

// Helper: Get current Pacific Time
function getCurrentPacificDate() {
  const now = new Date();
  const formatter = new Intl.DateTimeFormat('en-US', {
    timeZone: 'America/Los_Angeles',
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
  });
  const parts = formatter.formatToParts(now);
  const obj = {};
  for (const p of parts) if (p.type !== 'literal') obj[p.type] = p.value;
  return new Date(`${obj.year}-${obj.month}-${obj.day} ${obj.hour}:${obj.minute}:${obj.second}`);
}

// Parse match date/time from format "June 11 - 12:00"
// Parse match date/time from format "June 11 - 12:00"
function parseMatchDateTime(dateTimeStr) {
  if (!dateTimeStr || typeof dateTimeStr !== 'string') return new Date(0);
  try {
    // Clean up the string by removing the dash and extra spaces
    // Converts "June 11 - 12:00" to "June 11 12:00"
    const cleanStr = dateTimeStr.replace('-', '').replace(/\s+/g, ' ').trim(); 
    const parts = cleanStr.split(' ');
    
    // Safely grab the first 3 letters of the month ("June" -> "Jun")
    const monthStr = parts[0].substring(0, 3); 
    const months = { Jan: 0, Feb: 1, Mar: 2, Apr: 3, May: 4, Jun: 5, Jul: 6, Aug: 7, Sep: 8, Oct: 9, Nov: 10, Dec: 11 };
    
    const month = months[monthStr];
    const day = parseInt(parts[1], 10);
    const [hour, minute] = parts[2].split(':');
    
    return new Date(2026, month, day, parseInt(hour, 10), parseInt(minute, 10), 0, 0);
  } catch(e) {
    console.error('Error parsing date:', dateTimeStr);
    return new Date(0);
  }
}

// Calculate points
function calcPoints(homeScore, awayScore, predH, predA) {
  if (homeScore === null || awayScore === null) return null;
  if (predH === null || predA === null) return null;
  if (predH === homeScore && predA === awayScore) return 3;
  const actualSign = Math.sign(homeScore - awayScore);
  const predSign = Math.sign(predH - predA);
  return actualSign === predSign ? 1 : 0;
}

// Load data from Apps Script Web App
async function loadData() {
  const loadingMsg = document.getElementById('loadingMsg');
  const appContent = document.getElementById('appContent');
  
  loadingMsg.style.display = 'block';
  appContent.style.display = 'none';
  loadingMsg.innerHTML = '<div>Loading data from Google Sheets...</div>';
  
  try {
    const response = await fetch(SCRIPT_URL);
    
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await response.json();
    
    if (!data || data.length === 0) throw new Error('No data found in sheet');
    
    // Parse the data based on your exact structure
    parseSheetData(data);
    
    // Hide loading, show app
    loadingMsg.style.display = 'none';
    appContent.style.display = 'block';
    buildAllUI();
    
  } catch (err) {
    console.error('Error:', err);
    loadingMsg.innerHTML = `
      <div class="error">
        <strong>Failed to load data from Google Sheets</strong><br><br>
        Error: ${err.message}<br><br>
        Check the console (F12) for more details.
      </div>
    `;
  }
}

function parseSheetData(rows) {
  if (!rows || rows.length < 3) {
    throw new Error('Insufficient data rows. Found: ' + (rows ? rows.length : 0));
  }
  
  // Row 0 has player names at columns 5, 8, 11, 14, 17 (Amit, Barun, Prashanna, Rishav, Sweastik)
  const headerRow0 = rows[0] || [];
  const playerNames = [];
  // Player positions in row 0: index 5=Amit, 8=Barun, 11=Prashanna, 14=Rishav, 17=Sweastik
  const playerIndices = [5, 8, 11, 14, 17];
  for (let idx of playerIndices) {
    if (headerRow0[idx] && headerRow0[idx].toString().trim() !== '') {
      playerNames.push(headerRow0[idx].toString().trim());
    }
  }
  
  console.log('Players found:', playerNames);
  
  // Build PLAYERS array
  PLAYERS = playerNames.map(name => ({
    name: name,
    color: PLAYER_COLORS[name]?.color || '#888',
    bg: PLAYER_COLORS[name]?.bg || '#e0e0e0',
    textc: PLAYER_COLORS[name]?.textc || '#333',
    initials: PLAYER_COLORS[name]?.initials || name.slice(0, 2).toUpperCase(),
    pts: 0
  }));
  
  if (PLAYERS.length) activePlayer = PLAYERS[0].name;
  
  // Data rows start at index 2 (skip row0 and row1)
  const dataRows = rows.slice(2);
  MATCHES = [];
  
  for (let r = 0; r < dataRows.length; r++) {
    const cols = dataRows[r];
    if (!cols || cols.length < 5) continue;
    
    const dateTimeStr = cols[0];
    if (!dateTimeStr || dateTimeStr === '') continue;
    
    const group = cols[1] || '';
    const matchup = cols[2] || '';
    const homeScoreRaw = (cols[3] === '' || cols[3] === undefined || cols[3] === null) ? null : parseInt(cols[3], 10);
    const awayScoreRaw = (cols[4] === '' || cols[4] === undefined || cols[4] === null) ? null : parseInt(cols[4], 10);
    
    const predictions = [];
    for (let i = 0; i < PLAYERS.length; i++) {
      const baseIdx = 5 + (i * 3);
      let homePred = null;
      let awayPred = null;
      
      if (cols[baseIdx] !== '' && cols[baseIdx] !== undefined && cols[baseIdx] !== null) {
        homePred = parseInt(cols[baseIdx], 10);
      }
      if (cols[baseIdx + 1] !== '' && cols[baseIdx + 1] !== undefined && cols[baseIdx + 1] !== null) {
        awayPred = parseInt(cols[baseIdx + 1], 10);
      }
      
      predictions.push({ 
        p: PLAYERS[i].name, 
        h: isNaN(homePred) ? null : homePred, 
        a: isNaN(awayPred) ? null : awayPred, 
        pts: null 
      });
    }
    
    MATCHES.push({
      id: r + 1,
      dateTimeRaw: dateTimeStr,
      dateDisplay: dateTimeStr,
      group: group,
      matchup: matchup,
      homeScoreRaw: homeScoreRaw,
      awayScoreRaw: awayScoreRaw,
      homeScore: null,
      awayScore: null,
      preds: predictions
    });
  }
  
  console.log('Matches parsed:', MATCHES.length);
  
  // Determine which matches have started based on current Pacific time
  const now = getCurrentPacificDate();
  MATCHES.forEach(m => {
    const matchDate = parseMatchDateTime(m.dateTimeRaw);
    if (now >= matchDate) {
      m.homeScore = m.homeScoreRaw;
      m.awayScore = m.awayScoreRaw;
    } else {
      m.homeScore = null;
      m.awayScore = null;
    }
  });
  
  // Calculate points
  MATCHES.forEach(m => {
    m.preds.forEach(pr => {
      pr.pts = calcPoints(m.homeScore, m.awayScore, pr.h, pr.a);
    });
  });
  
  PLAYERS.forEach(p => {
    p.pts = MATCHES.reduce((sum, m) => sum + (m.preds.find(pr => pr.p === p.name)?.pts || 0), 0);
  });
  
  console.log('Players points calculated');
}

// UI Builders
function buildAllUI() {
  buildTodaysGames(); // Added function
  buildUpcomingCarousel();
  buildLeaderboard();
  buildOverviewStats();
  buildStatusTabs();
  buildGroupTabs();
  renderMatchList();
  buildPlayerBtns();
  renderPlayerDetail();
}

// NEW: Build Today's Games UI
function buildTodaysGames() {
  const container = document.getElementById('todaysGamesContainer');
  if (!container) return;

  const now = getCurrentPacificDate();
  const today = now.getDate();
  const month = now.getMonth();
  const year = now.getFullYear();

  // Filter matches matching today's exact date
  const todaysMatches = MATCHES.filter(m => {
    const matchDate = parseMatchDateTime(m.dateTimeRaw);
    return matchDate.getDate() === today && 
           matchDate.getMonth() === month && 
           matchDate.getFullYear() === year;
  }).sort((a, b) => parseMatchDateTime(a.dateTimeRaw) - parseMatchDateTime(b.dateTimeRaw));

  // Handle days with no games
  if (!todaysMatches.length) {
    container.innerHTML = `
      <div class="card" style="padding: 16px; text-align: center; color: var(--text-tertiary);">
        <i class="ti ti-calendar-off" style="font-size: 24px; margin-bottom: 8px; display: block;"></i>
        <div style="font-size: 13px;">No games scheduled for today.</div>
      </div>`;
    return;
  }

  // Generate the UI tiles for today's games
  container.innerHTML = todaysMatches.map(m => {
    const isPending = m.homeScore === null;
    
    // Build the list of player predictions
    const predsHtml = m.preds.map(pr => {
      const col = PLAYERS.find(p => p.name === pr.p)?.color || '#888';
      
      if (pr.h === null) {
        return `<div class="pred-row"><div class="pred-left"><span class="pred-dot" style="background:${col}"></span><span class="pred-pname">${pr.p}</span></div><span class="no-pred">TBD</span></div>`;
      }
      
      const cls = isPending ? '' : (pr.pts === 3 ? 'correct' : (pr.pts === 1 ? 'partial' : 'wrong'));
      return `
        <div class="pred-row ${cls}">
          <div class="pred-left">
            <span class="pred-dot" style="background:${col}"></span>
            <span class="pred-pname">${pr.p}</span>
          </div>
          <div style="display:flex; gap: 8px; align-items: center;">
            <span class="pred-score">${pr.h} – ${pr.a}</span>
            ${!isPending ? ptsBadge(pr.pts) : ''}
          </div>
        </div>`;
    }).join('');

    // Extract just the time (e.g., "12:00") from "June 11 - 12:00"
    const timeOnly = m.dateTimeRaw.includes(' - ') ? m.dateTimeRaw.split(' - ')[1] : m.dateTimeRaw;

    // Return the full Match Tile
    return `
      <div class="match-card">
        <div class="match-head">
          <div class="match-head-left">
            <span class="grp-pill">${m.group}</span>
            <span class="match-time"><i class="ti ti-clock"></i> ${timeOnly}</span>
          </div>
          ${!isPending ? `<span class="score-badge" style="background:var(--green); color:white;">Final: ${m.homeScore} – ${m.awayScore}</span>` : '<span class="pending-tag">Today</span>'}
        </div>
        <div class="match-body">
          <div class="matchup-name" style="text-align:center; font-size:16px; font-weight:700; margin-bottom:12px; border-bottom: 0.5px solid var(--border); padding-bottom: 8px;">
            ${m.matchup}
          </div>
          <div class="sec-label" style="font-size: 9px; margin-bottom: 6px;">Player Predictions</div>
          <div class="preds-list">${predsHtml}</div>
        </div>
      </div>
    `;
  }).join('');
}

function buildUpcomingCarousel() {
  const now = getCurrentPacificDate();
  const upcoming = MATCHES.filter(m => parseMatchDateTime(m.dateTimeRaw) > now)
    .sort((a, b) => parseMatchDateTime(a.dateTimeRaw) - parseMatchDateTime(b.dateTimeRaw))
    .slice(0, 4);
  
  const track = document.getElementById('upcomingCarousel');
  if (!upcoming.length) {
    track.innerHTML = '<p class="no-pred" style="padding:16px;">No upcoming matches</p>';
    return;
  }
  
  track.innerHTML = upcoming.map(m => `
    <div class="carousel-card">
      <div class="cc-head">
        <div class="cg-head-title"><i class="ti ti-clock"></i> ${m.group}</div>
        <span class="cg-time-badge">${m.dateDisplay}</span>
      </div>
      <div class="cc-body">
        <div class="cc-matchup-title">${m.matchup}</div>
        <div class="cg-preds-label">Player Predictions</div>
        <div class="preds-list">
          ${m.preds.map(pr => {
            const col = PLAYERS.find(p => p.name === pr.p)?.color || '#888';
            if (pr.h === null) {
              return `<div class="pred-row"><div class="pred-left"><span class="pred-dot" style="background:${col}"></span><span class="pred-pname">${pr.p}</span></div><span class="no-pred">No prediction</span></div>`;
            }
            return `<div class="pred-row"><div class="pred-left"><span class="pred-dot" style="background:${col}"></span><span class="pred-pname">${pr.p}</span></div><span class="pred-score">${pr.h}–${pr.a}</span></div>`;
          }).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

function buildLeaderboard() {
  const sorted = [...PLAYERS].sort((a, b) => b.pts - a.pts);
  const maxPts = sorted[0]?.pts || 1;
  const rankLabels = ['1st', '2nd', '3rd', '4th', '5th'];
  const rankColors = ['#b8860b', '#888780', '#a0522d', '#888', '#888'];
  
  document.getElementById('leaderboard').innerHTML = sorted.map((p, i) => {
    const barW = Math.round((p.pts / maxPts) * 100);
    return `
      <div class="player-row" onclick="switchToPlayer('${p.name}')">
        <span class="rank-badge" style="color:${rankColors[i]}">${rankLabels[i]}</span>
        <div class="avatar" style="background:${p.bg};color:${p.textc}">${p.initials}</div>
        <div class="player-info">
          <div class="player-name">${p.name}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${barW}%;background:${p.color}"></div></div>
        </div>
        <div class="pts-col"><div class="pts-big">${p.pts}</div><div class="pts-unit">pts</div></div>
      </div>
    `;
  }).join('');
}

function buildOverviewStats() {
  const now = getCurrentPacificDate();
  const completed = MATCHES.filter(m => parseMatchDateTime(m.dateTimeRaw) <= now);
  const upcoming = MATCHES.filter(m => parseMatchDateTime(m.dateTimeRaw) > now);
  const sorted = [...PLAYERS].sort((a, b) => b.pts - a.pts);
  const top = sorted[0];
  
  const exactCounts = PLAYERS.map(p => 
    completed.reduce((s, m) => s + (m.preds.find(pr => pr.p === p.name)?.pts === 3 ? 1 : 0), 0)
  );
  const mostExact = Math.max(...exactCounts, 0);
  
  document.getElementById('overviewStats').innerHTML = `
    <div class="stat-box"><div class="sv">${completed.length}</div><div class="sl">matches scored</div></div>
    <div class="stat-box"><div class="sv">${upcoming.length}</div><div class="sl">upcoming</div></div>
    <div class="stat-box"><div class="sv" style="color:${top?.color}">${top?.pts || 0}</div><div class="sl">leader pts · ${top?.name || '-'}</div></div>
    <div class="stat-box"><div class="sv">${mostExact}</div><div class="sl">most exact scores</div></div>
  `;
  document.getElementById('headerSub').innerText = `${completed.length} match${completed.length !== 1 ? 'es' : ''} scored · ${upcoming.length} upcoming`;
}

function buildStatusTabs() {
  const container = document.getElementById('statusTabs');
  container.innerHTML = `
    <button class="pill-btn ${activeStatus === 'upcoming' ? 'active' : ''}" onclick="setMatchStatus('upcoming', this)"><i class="ti ti-calendar-time"></i> Upcoming Games</button>
    <button class="pill-btn ${activeStatus === 'previous' ? 'active' : ''}" onclick="setMatchStatus('previous', this)"><i class="ti ti-history"></i> Previous Results</button>
  `;
}

window.setMatchStatus = function(status, btn) {
  activeStatus = status;
  document.querySelectorAll('#statusTabs .pill-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMatchList();
};

function buildGroupTabs() {
  const groups = ['All', ...new Set(MATCHES.map(m => m.group))];
  const container = document.getElementById('groupTabs');
  container.innerHTML = groups.map((g, i) => `
    <button class="pill-btn ${i === 0 ? 'active' : ''}" onclick="filterGroup('${g}', this)">
      ${g === 'All' ? '<i class="ti ti-list"></i> All' : g}
      <span class="pill-count">${g === 'All' ? MATCHES.length : MATCHES.filter(m => m.group === g).length}</span>
    </button>
  `).join('');
}

window.filterGroup = function(g, btn) {
  activeGroup = g;
  document.querySelectorAll('#groupTabs .pill-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMatchList();
};

function renderMatchList() {
  const now = getCurrentPacificDate();
  let filtered = activeGroup === 'All' ? MATCHES : MATCHES.filter(m => m.group === activeGroup);
  filtered = filtered.filter(m => {
    const matchDate = parseMatchDateTime(m.dateTimeRaw);
    return activeStatus === 'upcoming' ? matchDate > now : matchDate <= now;
  });
  
  const container = document.getElementById('matchList');
  if (!filtered.length) {
    container.innerHTML = '<p class="no-pred" style="text-align:center;padding:24px;">No matches in this category</p>';
    return;
  }
  
  container.innerHTML = filtered.map(m => {
    const isPending = m.homeScore === null;
    const predsHtml = m.preds.map(pr => {
      const col = PLAYERS.find(p => p.name === pr.p)?.color || '#888';
      if (pr.h === null) {
        return `<div class="pred-row"><div class="pred-left"><span class="pred-dot" style="background:${col}"></span><span class="pred-pname">${pr.p}</span></div><span class="no-pred">—</span></div>`;
      }
      const cls = isPending ? '' : (pr.pts === 3 ? 'correct' : (pr.pts === 1 ? 'partial' : 'wrong'));
      return `<div class="pred-row ${cls}"><div class="pred-left"><span class="pred-dot" style="background:${col}"></span><span class="pred-pname">${pr.p}</span><span class="pred-score">${pr.h}–${pr.a}</span></div>${ptsBadge(isPending ? null : pr.pts)}</div>`;
    }).join('');
    
    return `
      <div class="match-card">
        <div class="match-head">
          <div class="match-head-left">
            <span class="grp-pill">${m.group}</span>
            <span class="match-time">${m.dateDisplay}</span>
          </div>
          ${isPending ? '<span class="pending-tag"><i class="ti ti-clock"></i> Upcoming</span>' : `<span class="score-badge">${m.homeScore} – ${m.awayScore}</span>`}
        </div>
        <div class="match-body">
          <div class="matchup-name">${m.matchup}</div>
          <div class="preds-list">${predsHtml}</div>
        </div>
      </div>
    `;
  }).join('');
}

function ptsBadge(pts) {
  if (pts === null) return '<span class="no-pred">—</span>';
  if (pts === 3) return '<span class="pts-badge p3">+3</span>';
  if (pts === 1) return '<span class="pts-badge p1">+1</span>';
  return '<span class="pts-badge p0">0</span>';
}

function buildPlayerBtns() {
  const container = document.getElementById('playerBtns');
  container.innerHTML = PLAYERS.map(p => `
    <button class="player-btn ${p.name === activePlayer ? 'active' : ''}" 
            style="${p.name === activePlayer ? `background:${p.color};border-color:${p.color};color:#fff` : ''}" 
            onclick="selectPlayer('${p.name}', this)">
      ${p.initials} ${p.name}
    </button>
  `).join('');
}

window.selectPlayer = function(name, btn) {
  activePlayer = name;
  document.querySelectorAll('#playerBtns .player-btn').forEach(b => {
    b.classList.remove('active');
    b.style.background = '';
    b.style.borderColor = '';
    b.style.color = '';
  });
  const p = PLAYERS.find(x => x.name === name);
  btn.classList.add('active');
  btn.style.background = p.color;
  btn.style.borderColor = p.color;
  btn.style.color = '#fff';
  renderPlayerDetail();
};

function renderPlayerDetail() {
  const p = PLAYERS.find(x => x.name === activePlayer);
  const now = getCurrentPacificDate();
  const completedMatches = MATCHES.filter(m => parseMatchDateTime(m.dateTimeRaw) <= now);
  const myPreds = completedMatches.map(m => ({ match: m, pred: m.preds.find(pr => pr.p === p.name) })).filter(x => x.pred && x.pred.pts !== null);
  
  const exact = myPreds.filter(x => x.pred.pts === 3).length;
  const correct = myPreds.filter(x => x.pred.pts === 1).length;
  const wrong = myPreds.filter(x => x.pred.pts === 0).length;
  const upcomingWithPred = MATCHES.filter(m => parseMatchDateTime(m.dateTimeRaw) > now && m.preds.find(pr => pr.p === p.name)?.h !== null);
  const accuracy = myPreds.length ? Math.round(((exact + correct) / myPreds.length) * 100) : 0;
  
  const sorted = [...PLAYERS].sort((a, b) => b.pts - a.pts);
  const rankPos = sorted.findIndex(x => x.name === p.name);
  const rankSuffix = ['st', 'nd', 'rd', 'th', 'th'][rankPos];
  
  document.getElementById('playerAvatar').style.background = p.bg;
  document.getElementById('playerAvatar').style.color = p.textc;
  document.getElementById('playerAvatar').innerText = p.initials;
  document.getElementById('playerName').innerText = p.name;
  document.getElementById('playerRank').innerText = `${rankPos + 1}${rankSuffix} place`;
  document.getElementById('playerPtsNum').innerText = p.pts;
  document.getElementById('playerPtsNum').style.color = p.color;
  
  document.getElementById('playerStats').innerHTML = `
    <div class="stat-box"><div class="sv" style="color:#1a6b3a">${exact}</div><div class="sl">exact scores (+3)</div></div>
    <div class="stat-box"><div class="sv" style="color:#b8860b">${correct}</div><div class="sl">correct result (+1)</div></div>
    <div class="stat-box"><div class="sv" style="color:#e05252">${wrong}</div><div class="sl">wrong predictions</div></div>
    <div class="stat-box"><div class="sv">${upcomingWithPred.length}</div><div class="sl">predictions pending</div></div>
  `;
  
  const accBar = document.getElementById('playerAccuracyBar');
  if (myPreds.length) {
    accBar.style.display = 'flex';
    document.getElementById('playerAccuracyVal').innerText = `${accuracy}%`;
    document.getElementById('playerAccuracyVal').style.color = p.color;
  } else {
    accBar.style.display = 'none';
  }
  
  const allRows = MATCHES.map(m => {
    const pr = m.preds.find(x => x.p === p.name);
    const isPending = m.homeScore === null;
    if (!pr || pr.h === null) {
      return `<div class="match-pred-row"><div><div class="match-pred-name">${m.matchup}</div><div class="no-pred" style="font-size:12px;margin-top:2px">No prediction</div></div></div>`;
    }
    const cls = isPending ? '' : (pr.pts === 3 ? 'correct' : (pr.pts === 1 ? 'partial' : 'wrong'));
    return `
      <div class="match-pred-row ${cls}">
        <div style="flex:1">
          <div class="match-pred-name">${m.matchup}</div>
          <div class="match-pred-score">${pr.h} – ${pr.a}${isPending ? '<span class="upcoming-inline"><i class="ti ti-clock"></i></span>' : ''}</div>
        </div>
        <div class="match-pred-right">
          ${isPending ? '<span class="no-pred">TBD</span>' : ptsBadge(pr.pts)}
          ${!isPending ? `<div class="actual-result">${m.homeScore}–${m.awayScore} actual</div>` : ''}
        </div>
      </div>
    `;
  }).join('');
  document.getElementById('playerMatchPreds').innerHTML = allRows;
}

// Navigation
window.showSection = function(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (id === 'matches') renderMatchList();
  if (id === 'standings') { 
    buildTodaysGames(); // Added here as well for nav updates
    buildUpcomingCarousel(); 
    buildLeaderboard(); 
    buildOverviewStats(); 
  }
};

window.switchToPlayer = function(name) {
  activePlayer = name;
  showSection('player', document.querySelectorAll('.nav-btn')[2]);
  buildPlayerBtns();
  renderPlayerDetail();
};

// Start the app
loadData();
</script>
</body>
</html>
