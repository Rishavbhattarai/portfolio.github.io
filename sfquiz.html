<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Cert Deck — Quiz Game</title>
    <style>
        /* ─── fonts ─── */
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Source+Sans+3:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

        /* ─── root ─── */
        :root {
            --bg-deep: #0a1710;
            --bg-card: #12261b;
            --bg-card-alt: #1a3325;
            --border-subtle: #2a4d38;
            --border-glow: #3a6b4a;
            --text-primary: #edf5ed;
            --text-secondary: #b8d0be;
            --text-dim: #7fa08a;
            --gold: #d9a84c;
            --gold-dim: #8a6f2e;
            --gold-glow: rgba(217, 168, 76, 0.15);
            --green-correct: #7fe0ac;
            --green-dim: #1e4d32;
            --red-wrong: #e2707a;
            --red-dim: #4a282c;
            --serif: 'Fraunces', serif;
            --sans: 'Source Sans 3', sans-serif;
            --mono: 'IBM Plex Mono', monospace;
            --radius: 16px;
            --shadow-card: 0 20px 48px -12px rgba(0, 0, 0, 0.7);
            --transition: 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
        }

        /* ─── reset ─── */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }
        html,
        body {
            height: 100%;
        }
        body {
            background:
                radial-gradient(ellipse 1200px 700px at 20% -10%, #1a4028 0%, transparent 65%),
                radial-gradient(ellipse 900px 600px at 90% 110%, #1a3520 0%, transparent 55%),
                var(--bg-deep);
            color: var(--text-primary);
            font-family: var(--sans);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        .hidden {
            display: none !important;
        }

        button {
            font-family: inherit;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
            border: none;
            background: none;
            color: inherit;
        }

        /* ─── app shell ─── */
        .app {
            width: 100%;
            max-width: 560px;
            margin: 0 auto;
            position: relative;
        }

        /* ─── shared card shell ─── */
        .shell {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius);
            padding: 32px 26px 28px;
            box-shadow: var(--shadow-card);
            backdrop-filter: blur(2px);
            transition: border-color 0.3s ease;
        }
        .shell:hover {
            border-color: var(--border-glow);
        }

        /* ─── brand ─── */
        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 6px;
        }
        .brand-mark {
            font-size: 26px;
            color: var(--gold);
            display: inline-block;
            line-height: 1;
        }
        .brand-mark.spin {
            animation: spin 1.8s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .brand h1 {
            font-family: var(--serif);
            font-weight: 700;
            font-size: 26px;
            letter-spacing: 0.4px;
            background: linear-gradient(135deg, var(--gold), #f0d080);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
            text-align: center;
            margin-top: 4px;
        }
        .tagline-mono {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text-dim);
        }

        /* ─── buttons ─── */
        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            transition: border-color 0.25s ease, color 0.25s ease, background 0.25s ease;
        }
        .btn-ghost:hover {
            border-color: var(--gold-dim);
            color: var(--text-primary);
            background: var(--gold-glow);
        }

        .btn-primary {
            background: var(--gold);
            color: #1a1710;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 15px;
            transition: transform 0.15s ease, filter 0.25s ease;
            box-shadow: 0 4px 16px rgba(217, 168, 76, 0.25);
        }
        .btn-primary:hover {
            filter: brightness(1.08);
            transform: scale(1.01);
        }
        .btn-primary:active {
            transform: scale(0.97);
        }

        .btn-icon {
            background: transparent;
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 15px;
            min-height: 40px;
            min-width: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.25s ease, color 0.25s ease, background 0.25s ease;
        }
        .btn-icon:hover {
            border-color: var(--gold-dim);
            color: var(--gold);
            background: var(--gold-glow);
        }
        .btn-icon:disabled {
            opacity: 0.3;
            cursor: default;
            pointer-events: none;
        }

        /* ─── status screen ─── */
        .status-screen .shell {
            text-align: center;
        }
        .status-screen .brand-mark {
            font-size: 34px;
        }
        .load-error {
            color: var(--red-wrong);
            font-size: 13px;
            margin-top: 12px;
            min-height: 20px;
        }

        /* ─── TOC ─── */
        .toc-screen .shell {
            padding-bottom: 24px;
        }
        .toc-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .toc-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            width: 100%;
            text-align: left;
            background: var(--bg-card-alt);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 8px;
            transition: border-color 0.25s ease, transform 0.15s ease, background 0.25s ease;
            cursor: pointer;
        }
        .toc-row:hover {
            border-color: var(--gold-dim);
            background: rgba(217, 168, 76, 0.06);
        }
        .toc-row:active {
            transform: scale(0.98);
        }
        .toc-row.toc-all {
            border-color: var(--gold-dim);
            background: linear-gradient(135deg, rgba(217, 168, 76, 0.10), transparent);
            margin-bottom: 14px;
        }
        .toc-row-main {
            min-width: 0;
            flex-shrink: 0;
            width: 40%;
        }
        .toc-row-title {
            display: block;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 2px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .toc-row-count {
            display: block;
            color: var(--text-dim);
            font-family: var(--mono);
            font-size: 11px;
        }
        .toc-row-progress {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }
        .toc-bar {
            flex: 1;
            height: 5px;
            background: var(--border-subtle);
            border-radius: 4px;
            overflow: hidden;
        }
        .toc-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--gold-dim), var(--gold));
            transition: width 0.5s ease;
            border-radius: 4px;
        }
        .toc-row-stat {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-dim);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .toc-reset-wrap {
            text-align: center;
            margin-top: 18px;
        }

        /* ─── QUIZ SCREEN ─── */
        .quiz-screen .shell {
            padding: 0;
            overflow: hidden;
        }

        .topbar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-subtle);
            background: var(--bg-card-alt);
        }
        .topbar .btn-icon {
            min-height: 34px;
            min-width: 34px;
            padding: 0 10px;
            font-size: 13px;
            border-radius: 8px;
        }
        .progress-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }
        .progress-track {
            flex: 1;
            height: 5px;
            background: var(--border-subtle);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--gold-dim), var(--gold));
            transition: width 0.4s ease;
            border-radius: 4px;
        }
        .progress-label {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text-dim);
            white-space: nowrap;
            flex-shrink: 0;
            font-weight: 500;
        }

        .topbar-right {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        /* ─── stage ─── */
        .stage {
            padding: 16px 16px 20px;
        }

        .scoreboard {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        .score-pill {
            font-family: var(--mono);
            font-size: 11px;
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            background: var(--bg-card-alt);
            font-weight: 500;
        }
        .score-pill.correct {
            color: var(--green-correct);
            border-color: var(--green-dim);
        }
        .score-pill.incorrect {
            color: var(--red-wrong);
            border-color: var(--red-dim);
        }
        .score-pill.unseen {
            color: var(--text-dim);
        }

        /* ─── card zone ─── */
        .card-zone {
            display: flex;
            align-items: stretch;
            gap: 6px;
        }

        .nav-arrow {
            background: var(--bg-card-alt);
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            width: 40px;
            min-width: 40px;
            border-radius: 50%;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.25s ease, color 0.25s ease, background 0.25s ease;
            flex-shrink: 0;
            height: auto;
            min-height: 40px;
        }
        .nav-arrow:hover:not(:disabled) {
            border-color: var(--gold-dim);
            color: var(--gold);
            background: var(--gold-glow);
        }
        .nav-arrow:disabled {
            opacity: 0.25;
            cursor: default;
            pointer-events: none;
        }

        .card-outer {
            flex: 1;
            min-width: 0;
            perspective: 1400px;
            min-height: 460px;
        }

        .card {
            position: relative;
            width: 100%;
            min-height: 460px;
            transform-style: preserve-3d;
            transition: transform 0.55s cubic-bezier(0.22, 0.61, 0.36, 1);
            cursor: pointer;
        }
        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            border-radius: 12px;
            padding: 22px 20px 18px;
            border: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            box-shadow: 0 12px 32px -12px rgba(0, 0, 0, 0.6);
            overflow-y: auto;
        }
        .card-front {
            background: var(--bg-card);
        }
        .card-back {
            background: var(--bg-card-alt);
            transform: rotateY(180deg);
        }

        .section-tag {
            align-self: flex-start;
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--gold);
            background: var(--gold-glow);
            border: 1px solid var(--gold-dim);
            border-radius: 5px;
            padding: 3px 10px;
            margin-bottom: 10px;
        }
        .qid {
            font-family: var(--mono);
            color: var(--text-dim);
            font-size: 11px;
            margin-bottom: 6px;
        }

        .question-text {
            font-family: var(--serif);
            font-size: 18px;
            line-height: 1.45;
            font-weight: 600;
            margin: 0 0 16px;
            color: var(--text-primary);
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: auto;
        }
        .option-btn {
            display: block;
            width: 100%;
            text-align: left;
            font-family: inherit;
            font-size: 14px;
            color: var(--text-primary);
            line-height: 1.5;
            padding: 10px 14px;
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            background: var(--bg-card-alt);
            min-height: 44px;
            transition: border-color 0.2s ease, background 0.2s ease, transform 0.12s ease, box-shadow 0.2s ease;
            cursor: pointer;
        }
        .option-btn:hover:not(.disabled) {
            border-color: var(--gold-dim);
            background: var(--gold-glow);
            box-shadow: 0 0 0 1px var(--gold-dim);
        }
        .option-btn:active:not(.disabled) {
            transform: scale(0.98);
        }
        .option-btn.disabled {
            cursor: default;
            opacity: 0.7;
        }
        .option-btn.chosen-correct {
            border-color: var(--green-correct);
            background: var(--green-dim);
            color: var(--green-correct);
            font-weight: 600;
            box-shadow: 0 0 0 1px var(--green-correct);
        }
        .option-btn.chosen-wrong {
            border-color: var(--red-wrong);
            background: var(--red-dim);
            color: var(--red-wrong);
            font-weight: 600;
            box-shadow: 0 0 0 1px var(--red-wrong);
        }
        .option-btn.reveal-correct {
            border-color: var(--green-correct);
            background: rgba(127, 224, 172, 0.10);
            color: var(--green-correct);
            box-shadow: 0 0 0 1px var(--green-correct);
        }

        .flip-hint {
            text-align: center;
            color: var(--text-dim);
            font-size: 12px;
            margin: 14px 0 0;
            font-weight: 400;
            letter-spacing: 0.02em;
        }

        /* ─── back face ─── */
        .result-banner {
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.03em;
            padding: 5px 14px;
            border-radius: 7px;
            align-self: flex-start;
            margin-bottom: 12px;
        }
        .result-banner.right {
            color: var(--green-correct);
            background: var(--green-dim);
            border: 1px solid var(--green-correct);
        }
        .result-banner.wrong {
            color: var(--red-wrong);
            background: var(--red-dim);
            border: 1px solid var(--red-wrong);
        }
        .result-banner.skipped {
            color: var(--text-dim);
            background: transparent;
            border: 1px solid var(--border-subtle);
        }

        .answer-badge {
            align-self: flex-start;
            font-family: var(--serif);
            font-weight: 700;
            font-size: 22px;
            color: #1a1710;
            background: var(--gold);
            border-radius: 8px;
            padding: 4px 14px;
            margin-bottom: 10px;
            box-shadow: 0 4px 12px rgba(217, 168, 76, 0.25);
        }
        .answer-text {
            font-size: 15px;
            font-weight: 600;
            margin: 0 0 8px;
            color: var(--text-primary);
            line-height: 1.5;
        }
        .reasoning-wrap {
            border-top: 1px solid var(--border-subtle);
            padding-top: 12px;
            margin-top: 4px;
        }
        .reasoning-label {
            font-family: var(--mono);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-dim);
            margin-bottom: 4px;
            display: block;
        }
        .explanation {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.65;
            margin: 0;
        }

        .card-back .flip-hint {
            margin-top: 12px;
        }

        /* ─── jump dots ─── */
        .jump-row {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
            margin-top: 16px;
            padding: 0 4px;
        }
        .jump-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: none;
            padding: 0;
            background: var(--border-subtle);
            transition: background 0.25s ease, transform 0.25s ease;
            cursor: pointer;
            flex-shrink: 0;
        }
        .jump-dot:hover {
            transform: scale(1.3);
        }
        .jump-dot.current {
            background: var(--gold);
            transform: scale(1.35);
            box-shadow: 0 0 8px rgba(217, 168, 76, 0.4);
        }
        .jump-dot.done-right {
            background: var(--green-correct);
        }
        .jump-dot.done-wrong {
            background: var(--red-wrong);
        }

        /* ─── DONE SCREEN ─── */
        .done-screen .shell {
            text-align: center;
        }
        .done-screen .brand-mark {
            font-size: 42px;
            display: block;
            color: var(--green-correct);
            margin-bottom: 4px;
        }
        .done-screen h1 {
            font-family: var(--serif);
            font-weight: 700;
            font-size: 26px;
            margin: 0 0 4px;
            background: linear-gradient(135deg, var(--gold), #f0d080);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .done-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }
        .done-actions .btn-ghost {
            width: 100%;
        }
        .done-actions .btn-primary {
            width: 100%;
        }

        /* ─── responsive ─── */
        @media (max-width: 640px) {
            body {
                padding: 8px;
            }
            .shell {
                padding: 20px 14px 18px;
                border-radius: 14px;
            }
            .brand h1 {
                font-size: 22px;
            }
            .brand-mark {
                font-size: 22px;
            }

            .toc-row {
                padding: 12px 12px;
                gap: 8px;
            }
            .toc-row-main {
                width: 38%;
            }
            .toc-row-title {
                font-size: 13px;
            }

            .topbar {
                padding: 10px 12px;
                gap: 6px;
            }
            .topbar .btn-icon {
                min-height: 30px;
                min-width: 30px;
                padding: 0 8px;
                font-size: 12px;
            }
            .progress-label {
                font-size: 11px;
            }

            .stage {
                padding: 12px 10px 14px;
            }
            .card-zone {
                gap: 4px;
            }
            .nav-arrow {
                width: 34px;
                min-width: 34px;
                min-height: 34px;
                font-size: 16px;
            }
            .card-outer {
                min-height: 420px;
            }
            .card {
                min-height: 420px;
            }
            .card-face {
                padding: 16px 14px 14px;
                border-radius: 10px;
            }
            .question-text {
                font-size: 16px;
                margin-bottom: 12px;
            }
            .option-btn {
                font-size: 13px;
                padding: 9px 12px;
                min-height: 40px;
            }
            .answer-badge {
                font-size: 19px;
                padding: 3px 12px;
            }
            .answer-text {
                font-size: 14px;
            }
            .explanation {
                font-size: 13px;
            }
            .flip-hint {
                font-size: 11px;
                margin-top: 10px;
            }
            .score-pill {
                font-size: 10px;
                padding: 4px 10px;
            }
            .jump-dot {
                width: 8px;
                height: 8px;
            }

            .done-screen .brand-mark {
                font-size: 34px;
            }
            .done-screen h1 {
                font-size: 22px;
            }
        }

        @media (max-width: 380px) {
            .card-outer,
            .card {
                min-height: 480px;
            }
            .question-text {
                font-size: 15px;
            }
            .option-btn {
                font-size: 12px;
                padding: 8px 10px;
                min-height: 36px;
            }
            .shell {
                padding: 14px 10px 14px;
            }
            .topbar {
                padding: 8px 10px;
                flex-wrap: wrap;
            }
            .topbar .btn-icon {
                font-size: 11px;
                min-height: 28px;
                min-width: 28px;
                padding: 0 6px;
            }
            .progress-label {
                font-size: 10px;
            }
        }

        /* ─── scrollbar polish ─── */
        .card-face::-webkit-scrollbar {
            width: 4px;
        }
        .card-face::-webkit-scrollbar-track {
            background: transparent;
        }
        .card-face::-webkit-scrollbar-thumb {
            background: var(--border-subtle);
            border-radius: 4px;
        }
        .card-face::-webkit-scrollbar-thumb:hover {
            background: var(--gold-dim);
        }
    </style>
</head>
<body>

    <div class="app">

        <!-- ===== LOADING ===== -->
        <section id="statusScreen" class="status-screen">
            <div class="shell">
                <div class="brand">
                    <span class="brand-mark spin" id="statusIcon">◇</span>
                    <h1>Cert Deck</h1>
                </div>
                <p class="tagline" id="statusMessage">Loading question bank…</p>
                <p class="load-error" id="loadError"></p>
            </div>
        </section>

        <!-- ===== TABLE OF CONTENTS ===== -->
        <section id="tocScreen" class="toc-screen hidden">
            <div class="shell">
                <header class="toc-header">
                    <div class="brand">
                        <span class="brand-mark">◇</span>
                        <h1>Cert Deck</h1>
                    </div>
                    <p class="tagline tagline-mono" id="tocTagline">100 questions</p>
                </header>

                <button class="toc-row toc-all" id="tocAllBtn">
                    <div class="toc-row-main">
                        <span class="toc-row-title">All questions</span>

            function normalize(raw) {
                let arr = raw;
                if (!Array.isArray(raw)) {
                    const candidate = Object.values(raw || {}).find(v => Array.isArray(v));
                    arr = candidate || [];
                }
                return arr.map((q, i) => ({
                    id: q.id ?? i + 1,
                    section: q.section || 'General',
                    question: q.question || '(missing question)',
                    options: Array.isArray(q.options) ? q.options : [],
                    correct_answer: (q.correct_answer || '').toString().trim(),
                    explanation: q.explanation || 'No explanation provided.'
                }));
            }

            function optionLetter(opt) {
                const m = /^([A-Za-z])[\).:]/.exec(opt.trim());
                return m ? m[1].toUpperCase() : null;
            }

            function correctLetter(q) {
                return q.correct_answer.replace(/[^A-Za-z]/g, '').toUpperCase();
            }

            function findCorrectOptionText(q) {
                const letter = correctLetter(q);
                const match = q.options.find(o => optionLetter(o) === letter);
                return match || q.correct_answer;
            }

            function escapeHtml(str) {
                const d = document.createElement('div');
                d.textContent = str;
                return d.innerHTML;
            }

            // ─── persistence ───
            function saveProgress() {
                try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ grades })); } catch (_) { /* ignore */ }
            }

            function loadProgress() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (raw) grades = JSON.parse(raw).grades || {};
                } catch (_) { grades = {}; }
            }

            // ─── stats ───
            function sectionStats(list) {
                const ids = list.map(q => q.id);
                let right = 0,
                    wrong = 0;
                ids.forEach(id => {
                    if (grades[id] === 'right') right++;
                    else if (grades[id] === 'wrong') wrong++;
                });
                return { total: ids.length, right, wrong, done: right + wrong };
            }

            // ─── boot ───
            function boot() {
                try {
                    const normalized = normalize(QUESTIONS_DATA);
                    if (!normalized.length) throw new Error('No questions found.');
                    allQuestions = normalized;
                    sectionsOrder = [...new Set(allQuestions.map(q => q.section))];
                    loadProgress();
                    showToc();
                } catch (err) {
                    statusIcon.classList.remove('spin');
                    statusIcon.textContent = '!';
                    statusMessage.textContent = 'Could not load question bank.';
                    loadError.textContent = err.message;
                }
            }

            // ─── TOC ───
            function showToc() {
                statusScreen.classList.add('hidden');
                quizScreen.classList.add('hidden');
                doneScreen.classList.add('hidden');
                tocScreen.classList.remove('hidden');
                renderToc();
            }

            function renderToc() {
                tocTagline.textContent = `${allQuestions.length} questions · ${sectionsOrder.length} sections`;

                const allStats = sectionStats(allQuestions);
                tocAllCount.textContent = `${allStats.total} cards`;
                tocAllFill.style.width = `${allStats.total ? (allStats.done / allStats.total) * 100 : 0}%`;
                tocAllStat.textContent = `${allStats.done} / ${allStats.total}`;

                tocList.innerHTML = '';
                sectionsOrder.forEach(section => {
                    const list = allQuestions.filter(q => q.section === section);
                    const stats = sectionStats(list);
                    const row = document.createElement('button');
                    row.className = 'toc-row';
                    row.innerHTML = `
                <div class="toc-row-main">
                  <span class="toc-row-title">${escapeHtml(section)}</span>
                  <span class="toc-row-count">${stats.total} cards</span>
                </div>
                <div class="toc-row-progress">
                  <div class="toc-bar"><div class="toc-bar-fill" style="width:${stats.total ? (stats.done/stats.total)*100 : 0}%"></div></div>
                  <span class="toc-row-stat">${stats.done} / ${stats.total}</span>
                </div>`;
                    row.addEventListener('click', () => enterQuiz(list));
                    tocList.appendChild(row);
                });
            }

            tocAllBtn.addEventListener('click', () => enterQuiz([...allQuestions]));
            tocResetBtn.addEventListener('click', () => {
                if (!confirm('Clear all progress?')) return;
                grades = {};
                saveProgress();
                renderToc();
            });
            backToTocBtn.addEventListener('click', showToc);
            doneBackToTocBtn.addEventListener('click', showToc);

            // ─── enter quiz ───
            function enterQuiz(list) {
                deck = list;
                index = 0;
                tocScreen.classList.add('hidden');
                doneScreen.classList.add('hidden');
                quizScreen.classList.remove('hidden');
                renderCard();
                renderJumpRow();
            }

            shuffleBtn.addEventListener('click', () => {
                for (let i = deck.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [deck[i], deck[j]] = [deck[j], deck[i]];
                }
                index = 0;
                renderCard();
                renderJumpRow();
            });

            // ─── render card ───
            function renderCard() {
                if (!deck.length) return;
                const q = deck[index];
                cardEl.classList.remove('flipped');

                frontSection.textContent = q.section;
                backSection.textContent = q.section;
                frontId.textContent = `Q${q.id}`;
                frontQuestion.textContent = q.question;

                frontOptions.innerHTML = q.options.map(o => {
                    const letter = optionLetter(o) || '';
                    return `<button type="button" class="option-btn" data-letter="${letter}">${escapeHtml(o)}</button>`;
                }).join('');
                frontOptions.classList.remove('answered');

                const correctText = findCorrectOptionText(q);
                answerBadge.textContent = q.correct_answer || '?';
                answerText.textContent = escapeHtml(correctText).replace(/^([A-Za-z])[\).:]\s*/, '');
                explanationText.textContent = q.explanation || 'No explanation provided.';

                const state = grades[q.id];
                resultBanner.className = 'result-banner' + (state ? ` ${state}` : '');
                resultBanner.textContent = state === 'right' ? '✓ Correct' : state === 'wrong' ? '✕ Incorrect' : '';

                progressCurrent.textContent = index + 1;
                progressTotal.textContent = deck.length;
                progressFill.style.width = `${((index + 1) / deck.length) * 100}%`;

                prevBtn.disabled = index === 0;
                nextBtn.textContent = index === deck.length - 1 ? '✓ Finish' : '›';

                updateScoreboard();
                highlightJumpDot();
            }

            // ─── answer selection ───
            function answerSelected(btn) {
                if (frontOptions.classList.contains('answered')) return;
                const q = deck[index];
                const chosenLetter = btn.dataset.letter;
                const correct = correctLetter(q);
                const isCorrect = chosenLetter === correct;

                frontOptions.classList.add('answered');
                [...frontOptions.children].forEach(b => b.classList.add('disabled'));
                btn.classList.add(isCorrect ? 'chosen-correct' : 'chosen-wrong');
                if (!isCorrect) {
                    const correctBtn = [...frontOptions.children].find(b => b.dataset.letter === correct);
                    if (correctBtn) correctBtn.classList.add('reveal-correct');
                }

                grades[q.id] = isCorrect ? 'right' : 'wrong';
                saveProgress();
                updateScoreboard();
                renderJumpRow();

                resultBanner.className = `result-banner ${isCorrect ? 'right' : 'wrong'}`;
                resultBanner.textContent = isCorrect ? '✓ Correct' : '✕ Incorrect';

                setTimeout(() => cardEl.classList.add('flipped'), 580);
            }

            frontOptions.addEventListener('click', (e) => {
                const btn = e.target.closest('.option-btn');
                if (!btn) return;
                e.stopPropagation();
                answerSelected(btn);
            });

            // ─── scoreboard ───
            function updateScoreboard() {
                const stats = sectionStats(deck);
                scoreCorrect.textContent = stats.right;
                scoreIncorrect.textContent = stats.wrong;
                scoreUnseen.textContent = stats.total - stats.done;
            }

            // ─── jump dots ───
            function renderJumpRow() {
                jumpRow.innerHTML = '';
                deck.forEach((q, i) => {
                    const dot = document.createElement('button');
                    dot.className = 'jump-dot';
                    dot.title = `Q${q.id}`;
                    if (grades[q.id] === 'right') dot.classList.add('done-right');
                    if (grades[q.id] === 'wrong') dot.classList.add('done-wrong');
                    dot.addEventListener('click', () => { index = i;
                        renderCard();
                        highlightJumpDot(); });
                    jumpRow.appendChild(dot);
                });
                highlightJumpDot();
            }

            function highlightJumpDot() {
                [...jumpRow.children].forEach((d, i) => d.classList.toggle('current', i === index));
            }

            // ─── navigation ───
            cardEl.addEventListener('click', () => cardEl.classList.toggle('flipped'));

            function goNext() {
                if (index < deck.length - 1) { index++;
                    renderCard(); } else { showDone(); }
            }

            function goPrev() {
                if (index > 0) { index--;
                    renderCard(); }
            }

            nextBtn.addEventListener('click', goNext);
            prevBtn.addEventListener('click', goPrev);

            document.addEventListener('keydown', (e) => {
                if (quizScreen.classList.contains('hidden')) return;
                if (e.code === 'Space') { e.preventDefault();
                    cardEl.classList.toggle('flipped'); }
                if (e.code === 'ArrowRight') goNext();
                if (e.code === 'ArrowLeft') goPrev();
                if (['1', '2', '3', '4'].includes(e.key) && !frontOptions.classList.contains('answered')) {
                    const btn = frontOptions.children[Number(e.key) - 1];
                    if (btn) answerSelected(btn);
                }
            });

            // ─── done ───
            function showDone() {
                quizScreen.classList.add('hidden');
                doneScreen.classList.remove('hidden');
                const stats = sectionStats(deck);
                doneSummary.textContent =
                    `${stats.right} correct · ${stats.wrong} missed · ${stats.total - stats.done} unseen`;
            }

            reviewMissedBtn.addEventListener('click', () => {
                const missedIds = new Set(deck.filter(q => grades[q.id] === 'wrong').map(q => q.id));
                if (!missedIds.size) { alert('No missed cards — great work!'); return; }
                deck = deck.filter(q => missedIds.has(q.id));
                index = 0;
                doneScreen.classList.add('hidden');
                quizScreen.classList.remove('hidden');
                renderCard();
                renderJumpRow();
            });

            restartAllBtn.addEventListener('click', () => {
                index = 0;
                doneScreen.classList.add('hidden');
                quizScreen.classList.remove('hidden');
                renderCard();
                renderJumpRow();
            });

            // ─── start ───
            boot();
        })();
    </script>

</body>
</html>
